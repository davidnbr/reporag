[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rag-mcp"
version = "0.1.0"
description = "Local-first RAG MCP server: AST chunking, SCIP graph, RRF+PPR retrieval"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.0.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-languages>=1.10.2",
    "lancedb>=0.8.0",
    "sentence-transformers>=3.0.0",
    "bm25s>=0.2.0",
    "networkx>=3.3",
    "scip>=0.3.0",
    "protobuf>=4.25.0",
    "numpy>=1.26.0",
    "pydantic>=2.7.0",
    "httpx>=0.27.0",
    "pyarrow>=16.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
rag-mcp = "rag_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["rag_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
